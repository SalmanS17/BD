<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday, Nidhi 🎂</title>
    <meta
      name="description"
      content="A heartfelt birthday wish for Nidhi — made with love."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="stylesheet.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <!-- ══ LOADING ══════════════════════════════════════════ -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-cake">🎂</div>
      <p class="loading-text">Preparing something special for you…</p>
    </div>

    <!-- ══ BACKGROUND IMAGE LIGHT ORBS ══════════════════════ -->
    <div class="bg-lights" id="bg-lights">
      <img
        src="b1.png"
        class="light-orb"
        alt=""
        data-speed="0.6"
        data-size="220"
      />
      <img
        src="b2.png"
        class="light-orb"
        alt=""
        data-speed="0.9"
        data-size="180"
      />
      <img
        src="b3.png"
        class="light-orb"
        alt=""
        data-speed="0.7"
        data-size="260"
      />
      <img
        src="b4.png"
        class="light-orb"
        alt=""
        data-speed="0.5"
        data-size="200"
      />
      <img
        src="b5.png"
        class="light-orb"
        alt=""
        data-speed="1.1"
        data-size="150"
      />
      <img
        src="b6.png"
        class="light-orb"
        alt=""
        data-speed="0.8"
        data-size="230"
      />
      <img
        src="b7.png"
        class="light-orb"
        alt=""
        data-speed="0.6"
        data-size="190"
      />
      <img
        src="b1.png"
        class="light-orb"
        alt=""
        data-speed="1.0"
        data-size="140"
      />
      <img
        src="b3.png"
        class="light-orb"
        alt=""
        data-speed="0.7"
        data-size="170"
      />
      <img
        src="b5.png"
        class="light-orb"
        alt=""
        data-speed="0.9"
        data-size="210"
      />
    </div>

    <!-- ══ CONFETTI CANVAS ═══════════════════════════════════ -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ══ AUDIO ══════════════════════════════════════════════ -->
    <audio class="song" loop preload="auto">
      <source src="hbd.mp3" type="audio/mpeg" />
    </audio>

    <!-- ══ FLOATING BALLOONS (always in DOM, JS shows them) ══ -->
    <div class="balloons" id="b1b"><span>H</span></div>
    <div class="balloons" id="b2b"><span>B</span></div>
    <div class="balloons" id="b3b"><span>D</span></div>
    <div class="balloons" id="b4b"><span>A</span></div>
    <div class="balloons" id="b5b"><span>R</span></div>
    <div class="balloons" id="b6b"><span>O</span></div>
    <div class="balloons" id="b7b"><span>H</span></div>
    <div class="balloons" id="b8b"><span>I</span></div>

    <!-- ══ BANNER ═════════════════════════════════════════════ -->
    <img
      src="banner.png"
      class="site-banner"
      id="site-banner"
      alt="Happy Birthday Banner"
    />

    <!-- ══ STAGE ══════════════════════════════════════════════ -->
    <div class="stage" id="stage">
      <!-- SCENE 1 · START ════════════════════════════════════ -->
      <div class="scene" id="scene-start">
        <div class="start-content">
          <div class="start-cake-emoji">🎂</div>
          <h1 class="start-title">Happy Birthday</h1>
          <div class="start-name">Nidhi</div>
          <p class="start-sub">A little something made just for you ✨</p>
          <button class="start-btn" id="start-btn">
            <span>Begin</span>
            <span class="btn-sparkle">✦</span>
          </button>
        </div>
      </div>

      <!-- SCENE 2 · CELEBRATION ══════════════════════════════ -->
      <div class="scene hidden" id="scene-celebrate">
        <!-- Decorative String Lights at top -->
        <div class="string-lights" id="string-lights">
          <div class="wire"></div>
          <span class="bulb-light" style="--c: #ffd700; --s: 1.1s"></span>
          <span class="bulb-light" style="--c: #ff6b6b; --s: 1.4s"></span>
          <span class="bulb-light" style="--c: #74b9ff; --s: 0.9s"></span>
          <span class="bulb-light" style="--c: #55efc4; --s: 1.6s"></span>
          <span class="bulb-light" style="--c: #fd79a8; --s: 1.2s"></span>
          <span class="bulb-light" style="--c: #fdcb6e; --s: 1s"></span>
          <span class="bulb-light" style="--c: #a29bfe; --s: 1.3s"></span>
          <span class="bulb-light" style="--c: #00cec9; --s: 0.85s"></span>
          <span class="bulb-light" style="--c: #ffd700; --s: 1.5s"></span>
          <span class="bulb-light" style="--c: #ff6b6b; --s: 1.1s"></span>
          <span class="bulb-light" style="--c: #55efc4; --s: 1.35s"></span>
          <span class="bulb-light" style="--c: #a29bfe; --s: 0.95s"></span>
        </div>

        <!-- Center content area (cake / wish display) -->
        <div class="celebrate-center" id="celebrate-center">
          <!-- Cake (hidden until step 5) -->
          <div class="cake-wrap" id="cake-wrap">
            <div class="cake" id="cake-el">
              <div class="cake-candles">
                <div class="cake-candle">
                  <div class="flame" id="fl1"></div>
                </div>
                <div class="cake-candle">
                  <div class="flame" id="fl2"></div>
                </div>
                <div class="cake-candle">
                  <div class="flame" id="fl3"></div>
                </div>
                <div class="cake-candle">
                  <div class="flame" id="fl4"></div>
                </div>
                <div class="cake-candle">
                  <div class="flame" id="fl5"></div>
                </div>
              </div>
              <div class="cake-frosting"></div>
              <div class="cake-body"></div>
            </div>
          </div>

          <!-- "Happy Birthday Nidhi" wish text (hidden until step 7) -->
          <div class="wish-display" id="wish-display">
            <div class="wish-hbd">Happy Birthday</div>
            <div class="wish-name">Nidhi 🎉</div>
          </div>
        </div>

        <!-- Sequential Control Buttons at bottom -->
        <nav class="ctrl-bar" id="ctrl-bar">
          <button class="ctrl-btn" id="btn-lights">💡 Turn On Lights</button>
          <button class="ctrl-btn" id="btn-music">🎵 Play Music</button>
          <button class="ctrl-btn" id="btn-banner">🎀 Let's Decorate</button>
          <button class="ctrl-btn" id="btn-balloons">
            🎈 Fly With Balloons
          </button>
          <button class="ctrl-btn" id="btn-cake">🎂 Bring the Cake</button>
          <button class="ctrl-btn" id="btn-candles">
            🕯️ Light the Candles
          </button>
          <button class="ctrl-btn" id="btn-wish">🎁 Happy Birthday!</button>
          <button class="ctrl-btn ctrl-btn--special" id="btn-message">
            💌 A Message for You
          </button>
        </nav>
      </div>

      <!-- SCENE 3 · STORY ═════════════════════════════════════ -->
      <div class="scene hidden" id="scene-story">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="sentence-wrap">
          <div class="sentence-card" id="sentence-card">
            <p class="sentence-text" id="sentence-text"></p>
          </div>
        </div>
        <div class="story-controls">
          <button class="story-nav-btn" id="btn-prev" title="Previous">
            ←
          </button>
          <button class="story-pause-btn" id="btn-pause" title="Pause">
            ⏸
          </button>
          <button class="story-nav-btn" id="btn-next" title="Next">→</button>
        </div>
      </div>

      <!-- SCENE 4 · FINALE ════════════════════════════════════ -->
      <div class="scene hidden" id="scene-finale">
        <div class="finale-content">
          <div class="finale-glow-text">Happy Birthday</div>
          <div class="finale-name">Nidhi</div>
          <div class="finale-sub">🎉 Wishing you an amazing year ahead 🎉</div>
          <button class="replay-btn" id="replay-btn">✦ Read Again</button>
        </div>
      </div>
    </div>
    <!-- /.stage -->

    <script src="effect.js"></script>
  </body>
</html>
